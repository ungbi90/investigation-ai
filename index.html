<title>조서AI</title>
<style>

}
.s-logo {

}
.s-input:focus { border-color: #2d7bf4; }
.s-btn {
  width: 100%;
  max-width: 320px;

}
.s-note { font-size: 11px; color: #4a5a7a; text-align: center; }

/* ── 앱 ── */
#app {
  display: none;

}

/* ── 헤더 ── */
#hdr {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 12px;

  border-bottom: 1px solid #1e2d4a;

.logo {

/* ── 피드 ── */

}
#feed::-webkit-scrollbar { width: 3px; }

/* ── 카드 ── */
.card {
  border-radius: 8px;

  border: 1px solid #1e2d4a;

.card-meta {

}

}

}
.sum-text {

}
.sum-src {
  font-size: 11px;
  color: #4a5a7a;
  font-style: italic;
  margin-top: 5px;
  padding-top: 5px;

  display: -webkit-box;

}
.pending-tag {
  display: flex;

}
.pending-text { font-size: 12px; color: #8899bb; word-break: keep-all; }

.dots { display: inline-flex; gap: 3px; }
.dots span {
  width: 4px; height: 4px;

}
.dots span:nth-child(2) { animation-delay: .2s; }
.dots span:nth-child(3) { animation-delay: .4s; }
@keyframes blink {
  0%,80%,100% { opacity: .2; transform: scale(.8); }
  40% { opacity: 1; transform: scale(1); }
}

.empty-state {
  display: flex;
  flex-direction: column;
  align-items: center;

/* ── 컨트롤 ── */

}

}

  text-align: center;

}

/* ── 상태바 ── */
#sbar {
  display: flex;
  align-items: center;
  justify-content: space-between;

  padding-bottom: max(4px, env(safe-area-inset-bottom));

}

}

  display: flex;

.btn-ghost { background: transparent; color: #8899bb; border-color: #2a3f6a; padding: 7px 14px; font-size: 12px; }
.btn-copy { background: rgba(0,228,154,.12); color: #00e49a; border-color: rgba(0,228,154,.35); padding: 7px 14px; font-size: 12px; }
.set-label { font-size: 12px; color: #8899bb; margin-bottom: 5px; }
.set-hint { font-size: 11px; color: #4a5a7a; line-height: 1.6; }
.set-hint a { color: #2d7bf4; }
</style>
</head>
<body>

<!-- 셋업 -->
<div id="setup">
  <div class="s-logo">INVESTIGATION AI</div>
  <div class="s-title">실시간 조서 어시스턴트</div>
  <div class="s-desc">발화 자동 인식 · 화자 분류 · 실시간 요약</div>
  <input class="s-input" id="key-input" type="password" placeholder="Gemini API 키 (AIza...)" autocomplete="off">
  <button class="s-btn" onclick="saveKey()">저장하고 시작하기</button>
  <div class="s-free">✓ Gemini 2.5 Flash-Lite — 완전 무료</div>
  <div class="s-note">무료 키 발급: <a href="https://aistudio.google.com/apikey" target="_blank">aistudio.google.com</a></div>
  <div class="s-note">키는 이 기기에만 저장됩니다</div>
</div>

<!-- 앱 -->
<div id="app">
  <!-- 헤더 -->
  <div id="hdr">
    <div class="logo">조서AI</div>
    <input class="case-input" id="case-no" placeholder="사건번호">
    <div class="rec-info">
      <div class="rdot" id="rdot"></div>
      <span id="rlabel">대기</span>
      <span class="rtime" id="rtime" style="display:none"></span>
    </div>
    <button class="icon-btn" title="설정" onclick="openSet()">⚙</button>
    <button class="icon-btn" title="내보내기" id="expbtn" onclick="openExp()" disabled>↑</button>
    <button class="icon-btn" title="초기화" onclick="clearAll()">✕</button>
  </div>

  <!-- 피드 -->
  <div id="feed">
    <div class="empty-state" id="empty">
      <div class="empty-icon">🎙</div>
      <div class="empty-title">조사 준비 완료</div>
      <div class="empty-desc">하단 [조사 시작]을 누르면<br>음성이 실시간으로 기록됩니다</div>
    </div>
  </div>

  <!-- 컨트롤 -->
  <div id="ctrl">
    <div class="ctrl-row">
      <button class="btn btn-start" id="startbtn" onclick="startRec()">● 조사 시작</button>
      <button class="btn btn-stop" id="stopbtn" onclick="stopRec()" style="display:none">■ 조사 종료</button>
      <button class="btn btn-export" id="expbtn2" onclick="openExp()" disabled>내보내기</button>
    </div>
    <div class="mode-row">
      <button class="mode-btn active" id="mode-auto" onclick="setMode(true)">✦ 자동 화자 인식</button>
      <button class="mode-btn" id="mode-manual" onclick="setMode(false)">✎ 수동 전환</button>
    </div>
    <div class="spk-row" id="spk-row" style="display:none">
      <button class="spk-btn q-active" id="spkq" onclick="setSpk('Q')">👮 Q 수사관</button>
      <button class="spk-btn" id="spka" onclick="setSpk('A')">🧑 A 진술자</button>
    </div>
    <div class="auto-label" id="auto-label">
      <span id="auto-spk" class="auto-q">👮 Q 수사관 발언 중</span>
    </div>
  </div>

  <!-- 상태바 -->
  <div id="sbar">
    <div class="sbar-item"><div class="sdot" id="sr-dot"></div><span id="sr-txt">음성인식 확인 중</span></div>
    <span id="interim"></span>
    <div class="sbar-item"><div class="sdot" id="api-dot"></div><span id="api-txt">API 대기</span></div>
  </div>
</div>

<!-- 내보내기 모달 -->
<div class="modal-bg" id="exp-modal" onclick="if(event.target===this)closeExp()">
  <div class="modal">
    <div class="modal-head">
      <div class="modal-title">📋 조서 보조 기록</div>
      <button class="btn btn-ghost" onclick="closeExp()">✕</button>
    </div>
    <div class="modal-body" id="exp-body"></div>
    <div class="modal-foot">
      <button class="btn btn-ghost" onclick="closeExp()">닫기</button>
      <button class="btn btn-copy" onclick="doCopy()">클립보드 복사</button>
    </div>
  </div>
</div>

<!-- 설정 모달 -->
<div class="modal-bg" id="set-modal" onclick="if(event.target===this)closeSet()">
  <div class="modal" style="max-height:60svh;">
    <div class="modal-head">
      <div class="modal-title">⚙ 설정</div>
      <button class="btn btn-ghost" onclick="closeSet()">✕</button>
    </div>
    <div>
      <div class="set-label">Gemini API 키</div>
      <input class="s-input" id="set-key" type="password" placeholder="AIza..." autocomplete="off" style="width:100%;max-width:100%;">
    </div>
    <div class="set-hint">
      무료 발급: <a href="https://aistudio.google.com/apikey" target="_blank">aistudio.google.com</a><br>
      키는 브라우저에만 저장됩니다
    </div>
    <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:4px;">
      <button class="btn btn-ghost" onclick="closeSet()">취소</button>
      <button class="btn btn-start" style="flex:0 0 auto;padding:8px 18px;" onclick="updateKey()">저장</button>
    </div>
  </div>
</div>

<script>
'use strict';

// ── 상태 ──────────────────────────────────────────
let apiKey = '';
let isRec = false;
let autoMode = true;
let manualSpk = 'Q';
let lastSpk = 'Q';
let elapsed = 0, timer = null;
let rec = null, running = false;
let lastTxt = '', lastTxtTime = 0;
let buf = [], bufTimer = null;
let seq = 0;
let transcripts = [], summaries = [];
let aiQueue = [], aiBusy = false;
let lastApiCall = 0;
const API_MIN_INTERVAL = 5000; // 최소 5초 간격
let ctx = []; // 맥락 큐 최대 6개

const END_RE = /(했어요|했습니다|그랬어요|그랬습니다|맞습니다|아닙니다|없어요|모릅니다|겠습니다|이에요|거예요|입니다|같아요|같습니다|이에요|죠$|네요|데요|고요|군요|지요|세요|어요|아요)$/;

// ── 초기화 ────────────────────────────────────────
window.addEventListener('load', () => {
  // 이전 버전 키 이름 호환
  const k = localStorage.getItem('joseo_api')
         || localStorage.getItem('joseo_key')
         || localStorage.getItem('joseo_api_key');
  if (k) {
    apiKey = k;
    localStorage.setItem('joseo_api', k); // 현재 키 이름으로 통일 저장
    showApp();
  }
  initSTT();
});

function showApp() {
  document.getElementById('setup').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
}

// ── API 키 ────────────────────────────────────────
function saveKey() {
  const v = document.getElementById('key-input').value.trim();
  if (v.length < 10) { alert('올바른 Gemini API 키를 입력해 주세요 (AIza로 시작)'); return; }
  apiKey = v;
  localStorage.setItem('joseo_api', v);
  localStorage.setItem('joseo_key', v);
  localStorage.setItem('joseo_api_key', v);
  showApp();
}
function openSet() {
  document.getElementById('set-key').value = apiKey;
  document.getElementById('set-modal').classList.add('open');
}
function closeSet() { document.getElementById('set-modal').classList.remove('open'); }
function updateKey() {
  const v = document.getElementById('set-key').value.trim();
  if (!v || v.length < 10) { alert('올바른 Gemini API 키를 입력해 주세요 (AIza로 시작하는 키)'); return; }
  apiKey = v;
  localStorage.setItem('joseo_api', v);
  // 이전 버전 키도 함께 저장
  localStorage.setItem('joseo_key', v);
  localStorage.setItem('joseo_api_key', v);
  closeSet();
  // 저장 확인 + API 상태 즉시 업데이트
  setAPI('idle');
  document.getElementById('api-txt').textContent = '키 저장됨 ✓';
  setTimeout(() => setAPI('idle'), 2000);
  alert('API 키가 저장됐습니다. 이제 조사를 시작하면 AI 요약이 작동합니다.');
}

// ── STT ──────────────────────────────────────────
function initSTT() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  const dot = document.getElementById('sr-dot');
  const txt = document.getElementById('sr-txt');
  if (!SR) {
    dot.classList.add('err');
    txt.textContent = '음성인식 미지원 (Chrome 필요)';
    document.getElementById('startbtn').disabled = true;
    return;
  }
  dot.classList.add('ok');
  txt.textContent = '음성인식 지원됨';

  rec = new SR();
  rec.lang = 'ko-KR';
  rec.continuous = false;
  rec.interimResults = true;

  rec.onresult = (e) => {
    let interim = '';
    for (let i = 0; i < e.results.length; i++) {
      if (e.results[i].isFinal) {
        const t = e.results[i][0].transcript.trim();
        if (!t) continue;
        const now = Date.now();
        if (t === lastTxt && now - lastTxtTime < 2000) continue;
        lastTxt = t; lastTxtTime = now;
        document.getElementById('interim').textContent = '';
        onFinal(t);
      } else {
        interim = e.results[i][0].transcript;
      }
    }
    if (interim) document.getElementById('interim').textContent = interim + '…';
  };

  rec.onerror = (e) => { if (e.error !== 'no-speech' && e.error !== 'aborted') console.warn(e.error); };
  rec.onend = () => { if (running) setTimeout(() => { try { rec.start(); } catch(_){} }, 80); };
}

function onFinal(text) {
  const time = new Date().toLocaleTimeString('ko-KR', {hour:'2-digit',minute:'2-digit',second:'2-digit'});
  const id = 'p' + (++seq);
  addPending(id, text, time);
  buf.push({ id, text, time, ctx: [...ctx] });
  clearTimeout(bufTimer);
  bufTimer = setTimeout(flush, END_RE.test(text) ? 1200 : 6000);
}

function flush() {
  clearTimeout(bufTimer);
  if (!buf.length) return;
  const items = [...buf];
  buf = [];
  const merged = items.map(x => x.text).join(' ');
  const rep = items[items.length - 1];
  // 15자 미만 단발 발화는 AI 호출 생략
  if (merged.length < 15) {
    fallback({ ids: items.map(x => x.id), text: merged, time: rep.time, ctx: rep.ctx });
    return;
  }
  aiQueue.push({ ids: items.map(x => x.id), text: merged, time: rep.time, ctx: rep.ctx });
  if (!aiBusy) processQ();
}

// ── 녹음 컨트롤 ───────────────────────────────────
function startRec() {
  if (!rec) return;
  running = true;
  lastTxt = ''; lastTxtTime = 0;
  try { rec.start(); } catch(_) {}
  isRec = true; elapsed = 0;
  timer = setInterval(() => {
    elapsed++;
    document.getElementById('rtime').textContent =
      String(Math.floor(elapsed/60)).padStart(2,'0') + ':' + String(elapsed%60).padStart(2,'0');
  }, 1000);
  document.getElementById('rdot').classList.add('on');
  document.getElementById('rlabel').textContent = 'REC';
  document.getElementById('rtime').style.display = '';
  document.getElementById('startbtn').style.display = 'none';
  document.getElementById('stopbtn').style.display = '';
  document.getElementById('case-no').disabled = true;
}

function stopRec() {
  running = false;
  if (buf.length) flush();
  try { rec.stop(); } catch(_) {}
  isRec = false; clearInterval(timer);
  document.getElementById('rdot').classList.remove('on');
  document.getElementById('rlabel').textContent = '완료';
  document.getElementById('rtime').style.display = 'none';
  document.getElementById('startbtn').style.display = '';
  document.getElementById('stopbtn').style.display = 'none';
  document.getElementById('case-no').disabled = false;
  document.getElementById('interim').textContent = '';
}

function clearAll() {
  if (isRec) stopRec();
  transcripts = []; summaries = []; aiQueue = []; ctx = [];
  buf = []; seq = 0; aiBusy = false;
  clearTimeout(bufTimer);
  lastSpk = 'Q';
  const f = document.getElementById('feed');
  f.innerHTML = '';
  const emp = document.createElement('div');
  emp.className = 'empty-state'; emp.id = 'empty';
  emp.innerHTML = '<div class="empty-icon">🎙</div><div class="empty-title">조사 준비 완료</div><div class="empty-desc">하단 [조사 시작]을 누르면<br>음성이 실시간으로 기록됩니다</div>';
  f.appendChild(emp);
  document.getElementById('expbtn').disabled = true;
  document.getElementById('expbtn2').disabled = true;
  document.getElementById('interim').textContent = '';
  setAPI('idle');
  setAutoSpk('Q');
}

// ── 화자 모드 ─────────────────────────────────────
function setMode(auto) {
  autoMode = auto;
  document.getElementById('mode-auto').className = 'mode-btn' + (auto ? ' active' : '');
  document.getElementById('mode-manual').className = 'mode-btn' + (!auto ? ' active' : '');
  document.getElementById('spk-row').style.display = auto ? 'none' : 'flex';
  document.getElementById('auto-label').style.display = auto ? 'block' : 'none';
}
function setSpk(s) {
  manualSpk = s; lastSpk = s;
  document.getElementById('spkq').className = 'spk-btn' + (s==='Q' ? ' q-active' : '');
  document.getElementById('spka').className = 'spk-btn' + (s==='A' ? ' a-active' : '');
}
function setAutoSpk(s) {
  const el = document.getElementById('auto-spk');
  el.className = s === 'Q' ? 'auto-q' : 'auto-a';
  el.textContent = s === 'Q' ? '👮 Q 수사관 발언 중' : '🧑 A 진술자 발언 중';
}

// ── AI 큐 ─────────────────────────────────────────
function processQ() {
  if (aiBusy || !aiQueue.length) return;
  // 큐가 밀렸으면 오래된 것은 fallback으로 즉시 처리
  while (aiQueue.length > 1) {
    fallback(aiQueue.shift());
  }
  aiBusy = true;
  const item = aiQueue.shift();
  runAI(item).finally(() => {
    aiBusy = false;
    // 4초 간격으로 다음 호출 - 분당 최대 15회 한도 초과 방지
    setTimeout(processQ, 4000);
  });
}

async function runAI(item) {
  // Q 발화는 AI 요약 생략 (API 절약)
  if (item.text.length < 15) {
    fallback(item);
    return;
  }

  const ctxStr = item.ctx.length
    ? item.ctx.map((c,i) => `[${i+1}] ${c.s}: ${c.t}`).join('\n')
    : '(없음)';

  const prompt = `당신은 수사 보조 AI다. 아래 발화를 분석하여 JSON만 출력하라. 다른 텍스트 절대 금지.

[화자 판단]
Q: 의문형 어미(~습니까,~나요,~죠,~인가요), 짧은 질문, 확인·추궁 문장, 평서문이어도 확인 의도면 Q
A: 행동·상태·경위 설명, 질문에 대한 답변·인정·부인, 직전이 Q이면 A 우선
- 진술자 되묻기여도 직전이 Q면 A
- "네","아니요","맞습니다" 등 단답은 직전이 Q면 무조건 A

[요약 - A일 때만]
- 사건 관련 핵심 사실 한 문장
- 감정호소·중언부언 제거
- 3인칭 과거형: "피의자는 ~했다고 진술함"
- 무관 내용이면 statement를 빈 문자열

출력: {"speaker":"Q또는A","confidence":"high또는low","statement":"조서용문장또는빈문자열"}

맥락:
${ctxStr}

현재 발화: "${item.text}"`;

  const res = await callGemini(prompt);
  if (!res) { fallback(item); return; }
  const parsed = parseJSON(res);
  if (!parsed || !['Q','A'].includes(parsed.speaker)) { fallback(item); return; }
  confirm(item, parsed.speaker, parsed.confidence === 'low', parsed.statement || '');
}

function confirm(item, spk, isLow, stmt) {
  // 앞 pending 카드 제거 (병합된 경우)
  for (let i = 0; i < item.ids.length - 1; i++) {
    document.getElementById(item.ids[i])?.remove();
  }
  const pendEl = document.getElementById(item.ids[item.ids.length - 1]);

  const entry = { spk, text: item.text, time: item.time };
  transcripts.push(entry);
  ctx.push({ s: spk, t: item.text });
  if (ctx.length > 6) ctx.shift();
  lastSpk = spk;
  if (autoMode) setAutoSpk(spk);

  const html = `
    <div class="card-meta">
      <span class="spk-label ${spk==='Q'?'spk-q':'spk-a'}">${spk==='Q'?'Q 수사관':'A 진술자'}</span>
      ${isLow ? '<span class="est-badge">추정</span>' : ''}
      <span class="card-time">${item.time}</span>
    </div>
    <div class="card-text">${esc(item.text)}</div>`;

  if (pendEl) {
    pendEl.className = `card card-${spk.toLowerCase()}`;
    pendEl.innerHTML = html;
  } else {
    addCard(`card card-${spk.toLowerCase()}`, html);
  }

  document.getElementById('expbtn').disabled = false;
  document.getElementById('expbtn2').disabled = false;
  scrollFeed();

  if (spk === 'A' && stmt.trim()) {
    summaries.push({ stmt, src: item.text });
    addCard('card card-sum', `
      <div class="sum-tag">⚡ 핵심 팩트</div>
      <div class="sum-text">${esc(stmt)}</div>
      <div class="sum-src">원문: "${esc(item.text)}"</div>`);
    scrollFeed();
  }
}

function fallback(item) {
  const t = item.text;
  let spk = lastSpk;
  if (/(습니까|입니까|인가요|나요|까요|맞죠|그렇죠|였나요|했나요)$/.test(t)) spk = 'Q';
  else if (lastSpk === 'Q') spk = 'A';
  confirm(item, spk, true, '');
}

// ── Gemini API ────────────────────────────────────
async function callGemini(prompt) {
  if (!apiKey) {
    setAPI('err');
    addErrCard('API 키 없음 — ⚙ 설정에서 Gemini API 키를 입력해 주세요.');
    return null;
  }
  for (let i = 0; i < 3; i++) {
    try {
      const url = 'https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-lite:generateContent?key=' + apiKey;
      const r = await fetch(url, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          contents: [{ parts: [{ text: prompt }] }],
          generationConfig: { maxOutputTokens: 200, temperature: 0.1, responseMimeType: 'application/json' }
        })
      });
      if (r.status === 429) { await sleep(8000); lastApiCall = Date.now() + 8000; continue; }
      if (!r.ok) {
        const e = await r.json().catch(()=>({}));
        const msg = e?.error?.message || ('HTTP ' + r.status);
        setAPI('err');
        addErrCard('Gemini 오류 [' + r.status + ']: ' + msg);
        return null; // 재시도 없이 즉시 반환 — 오류 원인을 바로 표시
      }
      const d = await r.json();
      const t = d?.candidates?.[0]?.content?.parts?.[0]?.text?.trim() || '';
      if (!t) throw new Error('빈 응답');
      setAPI('ok');
      return t;
    } catch(e) {
      if (i === 2) { setAPI('err'); addErrCard('연결 실패: ' + e.message); return null; }
      await sleep(800 * (i + 1));
    }
  }
  return null;
}

// ── DOM 헬퍼 ─────────────────────────────────────
function addPending(id, text, time) {
  document.getElementById('empty')?.remove();
  const d = document.createElement('div');
  d.className = 'card card-pending';
  d.id = id;
  d.innerHTML = `<div class="pending-tag"><div class="dots"><span></span><span></span><span></span></div>화자 판단 중</div><div class="pending-text">${esc(text)}</div><div class="pending-time">${time}</div>`;
  document.getElementById('feed').appendChild(d);
  scrollFeed();
}

function addCard(cls, html) {
  document.getElementById('empty')?.remove();
  const d = document.createElement('div');
  d.className = cls;
  d.innerHTML = html;
  document.getElementById('feed').appendChild(d);
}

function addErrCard(msg) {
  document.getElementById('empty')?.remove();
  const d = document.createElement('div');
  d.className = 'card card-err';
  d.innerHTML = `<div class="card-text" style="color:#ff4c5e;">⚠ ${esc(msg)}</div>`;
  document.getElementById('feed').appendChild(d);
  scrollFeed();
}

function scrollFeed() {
  const f = document.getElementById('feed');
  f.scrollTop = f.scrollHeight;
}

function setAPI(s) {
  const dot = document.getElementById('api-dot');
  const txt = document.getElementById('api-txt');
  dot.className = 'sdot' + (s==='ok' ? ' ok' : s==='err' ? ' err' : '');
  txt.textContent = s==='ok' ? 'Gemini 연결됨' : s==='err' ? 'API 오류' : 'API 대기';
}

function esc(s) {
  return String(s||'')
    .replace(/&/g,'&amp;')
    .replace(/</g,'&lt;')
    .replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

function parseJSON(t) {
  try { return JSON.parse(t.replace(/```json|```/g,'').trim()); }
  catch(_) {
    const m = t.match(/\{[\s\S]*?\}/);
    if (m) try { return JSON.parse(m[0]); } catch(_){}
    return null;
  }
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

// ── 내보내기 ──────────────────────────────────────
function openExp() {
  const caseNo = document.getElementById('case-no').value || '미입력';
  const now = new Date().toLocaleString('ko-KR');
  const qn = transcripts.filter(t=>t.spk==='Q').length;
  const an = transcripts.filter(t=>t.spk==='A').length;
  const facts = summaries.length
    ? summaries.map((s,i)=>`[${i+1}] ${s.stmt}`).join('\n')
    : '  (없음)';
  const raw = transcripts.length
    ? transcripts.map(t=>`(${t.time}) [${t.spk==='Q'?'Q 수사관':'A 진술자'}] ${t.text}`).join('\n')
    : '  (없음)';

  document.getElementById('exp-body').textContent = [
    '■ 조서 보조 기록',
    `사건번호  : ${caseNo}`,
    `조사일시  : ${now}`,
    `발화현황  : Q ${qn}건 / A ${an}건`,
    '',
    '━'.repeat(42),
    '【 AI 핵심 요약 — 조서 기재용 】',
    '━'.repeat(42),
    facts,
    '',
    '━'.repeat(42),
    '【 전체 전사 원문 】',
    '━'.repeat(42),
    raw
  ].join('\n');

  document.getElementById('exp-modal').classList.add('open');
}
function closeExp() { document.getElementById('exp-modal').classList.remove('open'); }
function doCopy() {
  navigator.clipboard.writeText(document.getElementById('exp-body').textContent)
    .then(() => {
      const b = event.target;
      b.textContent = '복사됨 ✓';
      setTimeout(() => { b.textContent = '클립보드 복사'; }, 1800);
    })
    .catch(() => alert('복사 실패'));
}
