<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="조서AI"/>
<meta name="theme-color" content="#0f1520"/>
<link rel="manifest" href="./manifest.json"/>
<title>실시간 조서 어시스턴트</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet"/>
<style>
:root{
  --bg:#0a0e14; --panel:#0f1520; --card:#141c2e; --elevated:#1a2440;
  --border:#1e2d4a; --border-hi:#2a3f6a;
  --blue:#2d7bf4; --cyan:#00c9e4; --green:#00e49a;
  --red:#ff4c5e; --orange:#ff8c42; --yellow:#f5c842;
  --q:#60a5fa; --a:#34d399;
  --text:#e8edf5; --text2:#8899bb; --text3:#4a5a7a;
  --font:'Noto Sans KR',sans-serif; --mono:'JetBrains Mono',monospace;
  --st:env(safe-area-inset-top,0px); --sb:env(safe-area-inset-bottom,0px);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--font);}

/* ── SETUP ── */
#setup{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100dvh;padding:28px;gap:18px;background:var(--bg);}
.su-badge{background:linear-gradient(135deg,var(--blue),var(--cyan));color:#fff;font-size:11px;font-weight:700;letter-spacing:2px;padding:5px 13px;border-radius:5px;}
.su-title{font-size:22px;font-weight:700;text-align:center;}
.su-desc{font-size:13px;color:var(--text2);text-align:center;line-height:1.75;max-width:320px;}
.su-inp{width:100%;max-width:320px;background:var(--card);border:1px solid var(--border-hi);border-radius:8px;color:var(--text);font-size:13px;font-family:var(--mono);padding:12px 14px;outline:none;}
.su-inp:focus{border-color:var(--blue);}
.su-link{font-size:12px;color:var(--text3);text-align:center;}
.su-link a{color:var(--blue);}

/* ── APP ── */
#app{display:none;flex-direction:column;height:100dvh;}

/* ── HEADER ── */
#hdr{display:flex;align-items:center;gap:8px;padding:calc(var(--st) + 8px) 13px 8px;background:var(--panel);border-bottom:1px solid var(--border);flex-shrink:0;}
.logo{background:linear-gradient(135deg,var(--blue),var(--cyan));color:#fff;font-size:10px;font-weight:700;letter-spacing:1.5px;padding:3px 9px;border-radius:4px;white-space:nowrap;}
.case-inp{flex:1;min-width:0;background:var(--card);border:1px solid var(--border-hi);border-radius:6px;color:var(--text);font-size:12px;font-family:var(--mono);padding:5px 10px;outline:none;}
.case-inp::placeholder{color:var(--text3);}
.case-inp:focus{border-color:var(--blue);}
.rec-wrap{display:flex;align-items:center;gap:5px;font-size:11px;font-family:var(--mono);color:var(--text3);white-space:nowrap;}
.rec-dot{width:7px;height:7px;border-radius:50%;background:var(--text3);flex-shrink:0;}
.rec-dot.on{background:var(--red);animation:pulse 1s infinite;}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(255,76,94,.5)}50%{box-shadow:0 0 0 5px rgba(255,76,94,0)}}
.rec-time{color:var(--red);font-weight:600;}
.ibtn{background:transparent;border:1px solid var(--border-hi);border-radius:6px;color:var(--text2);font-size:15px;width:30px;height:30px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.15s;flex-shrink:0;}
.ibtn:hover{background:var(--elevated);color:var(--text);}

/* ── FEED ── */
#feed-wrap{flex:1;overflow-y:auto;padding:10px 12px 6px;display:flex;flex-direction:column;gap:8px;}
#feed-wrap::-webkit-scrollbar{width:3px;}
#feed-wrap::-webkit-scrollbar-thumb{background:var(--border-hi);border-radius:2px;}

/* ── CARDS ── */
.card{border-radius:8px;background:var(--card);border:1px solid var(--border);animation:up .22s ease;position:relative;overflow:hidden;padding:10px 12px 10px 15px;}
.card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;}
.card-q::before{background:var(--q);}
.card-a::before{background:var(--a);}
.card-fact::before{background:var(--cyan);}
.card-contra::before{background:var(--red);}
.card-suggest::before{background:var(--yellow);}
.card-err::before{background:var(--text3);}
@keyframes up{from{opacity:0;transform:translateY(7px)}to{opacity:1;transform:translateY(0)}}

/* Q/A 카드 */
.qa-meta{display:flex;align-items:center;gap:6px;margin-bottom:5px;}
.qa-spk{font-size:11px;font-weight:700;font-family:var(--mono);letter-spacing:.5px;}
.qa-spk.q{color:var(--q)}.qa-spk.a{color:var(--a)}
.qa-time{font-size:10px;font-family:var(--mono);color:var(--text3);}
.qa-text{font-size:13px;line-height:1.65;color:var(--text);word-break:keep-all;}

/* 팩트 카드 */
.fact-tag{display:flex;align-items:center;gap:5px;font-size:10px;font-weight:700;font-family:var(--mono);letter-spacing:1px;color:var(--cyan);margin-bottom:6px;}
.fact-main{font-size:13px;font-weight:500;color:var(--text);line-height:1.6;word-break:keep-all;margin-bottom:5px;}
.fact-stmt{font-size:12px;color:var(--text2);line-height:1.6;word-break:keep-all;border-top:1px solid var(--border);padding-top:5px;margin-bottom:4px;}
.fact-src{font-size:11px;color:var(--text3);font-style:italic;overflow:hidden;display:-webkit-box;-webkit-line-clamp:1;-webkit-box-orient:vertical;}
.fact-kw{display:flex;flex-wrap:wrap;gap:4px;margin-top:5px;}
.kw{font-size:10px;font-family:var(--mono);background:rgba(0,201,228,.1);color:var(--cyan);padding:1px 6px;border-radius:10px;border:1px solid rgba(0,201,228,.2);}
.fact-seq{font-size:10px;font-family:var(--mono);color:var(--text3);text-align:right;margin-top:3px;}

/* 로딩 카드 */
.loading-card{border-radius:8px;background:var(--card);border:1px solid var(--border);padding:10px 12px 10px 15px;position:relative;overflow:hidden;}
.loading-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--orange);}
.ld-tag{display:flex;align-items:center;gap:5px;font-size:10px;font-weight:700;font-family:var(--mono);color:var(--orange);margin-bottom:4px;}
.dots{display:inline-flex;gap:3px;align-items:center;}
.dots span{width:4px;height:4px;border-radius:50%;background:var(--orange);animation:blink 1.2s ease-in-out infinite;}
.dots span:nth-child(2){animation-delay:.2s}.dots span:nth-child(3){animation-delay:.4s}
@keyframes blink{0%,80%,100%{opacity:.2;transform:scale(.8)}40%{opacity:1;transform:scale(1)}}

/* 모순 카드 */
.contra-tag{display:flex;align-items:center;gap:5px;font-size:10px;font-weight:700;font-family:var(--mono);color:var(--red);margin-bottom:7px;}
.contra-level{font-size:9px;padding:1px 5px;border-radius:3px;font-weight:700;}
.contra-level.high{background:rgba(255,76,94,.2);color:var(--red);}
.contra-level.medium{background:rgba(255,140,66,.2);color:var(--orange);}
.contra-row{display:flex;gap:6px;font-size:12px;line-height:1.55;margin-bottom:3px;}
.contra-label{font-size:10px;font-family:var(--mono);color:var(--text3);min-width:36px;padding-top:1px;}
.contra-val{color:var(--text2);word-break:keep-all;}
.contra-note{font-size:12px;color:var(--red);margin-top:6px;padding-top:5px;border-top:1px solid rgba(255,76,94,.2);word-break:keep-all;}

/* 제안질문 카드 */
.sugg-tag{display:flex;align-items:center;gap:5px;font-size:10px;font-weight:700;font-family:var(--mono);color:var(--yellow);margin-bottom:6px;}
.sugg-list{display:flex;flex-direction:column;gap:5px;}
.sugg-item{display:flex;gap:6px;align-items:flex-start;}
.sugg-pri{font-size:10px;font-family:var(--mono);color:var(--yellow);min-width:14px;padding-top:2px;}
.sugg-q{font-size:13px;color:var(--text);line-height:1.55;word-break:keep-all;}
.sugg-reason{font-size:11px;color:var(--text3);font-style:italic;}

/* 빈 상태 */
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:200px;gap:10px;color:var(--text3);text-align:center;padding:20px;}
.empty-ico{font-size:36px;opacity:.35;}
.empty-t{font-size:14px;color:var(--text2);}
.empty-d{font-size:12px;line-height:1.7;}

/* ── BOTTOM CONTROLS ── */
#ctrl{display:flex;flex-direction:column;gap:6px;padding:8px 13px;background:var(--panel);border-top:1px solid var(--border);flex-shrink:0;}
.ctrl-row{display:flex;align-items:center;gap:8px;}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:5px;padding:8px 16px;border-radius:7px;font-size:13px;font-family:var(--font);font-weight:600;cursor:pointer;border:1px solid transparent;transition:all .15s;outline:none;white-space:nowrap;}
.btn:disabled{opacity:.4;cursor:not-allowed;}
.btn-primary{background:var(--blue);color:#fff;flex:1;}
.btn-primary:hover:not(:disabled){background:#4a90f5;}
.btn-danger{background:rgba(255,76,94,.15);color:var(--red);border-color:rgba(255,76,94,.4);flex:1;}
.btn-danger:hover:not(:disabled){background:rgba(255,76,94,.25);}
.spk-wrap{display:flex;align-items:center;gap:4px;background:var(--card);border:1px solid var(--border-hi);border-radius:7px;padding:4px;flex:1;}
.spk-btn{flex:1;padding:6px 8px;border-radius:5px;font-size:12px;font-weight:700;cursor:pointer;border:none;transition:.15s;background:transparent;color:var(--text3);letter-spacing:.3px;font-family:var(--font);}
.spk-btn.q-on{background:rgba(96,165,250,.2);color:var(--q);}
.spk-btn.a-on{background:rgba(52,211,153,.2);color:var(--a);}

/* ── STATUS BAR ── */
#sbar{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:6px;padding:4px 13px calc(var(--sb)+4px);background:var(--panel);border-top:1px solid var(--border);flex-shrink:0;}
.si{display:flex;align-items:center;gap:4px;font-size:10px;font-family:var(--mono);color:var(--text3);}
.sdot{width:5px;height:5px;border-radius:50%;background:var(--text3);flex-shrink:0;}
.sdot.ok{background:var(--green)}.sdot.err{background:var(--red)}
#interim-txt{flex:1;min-width:0;font-size:11px;color:var(--text3);font-style:italic;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-align:center;}

/* ── MODAL ── */
.modal-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.82);align-items:center;justify-content:center;z-index:200;}
.modal-ov.show{display:flex;}
.modal{background:var(--panel);border:1px solid var(--border-hi);border-radius:12px;padding:20px;width:min(580px,95vw);max-height:88dvh;display:flex;flex-direction:column;gap:14px;}
.modal-head{display:flex;align-items:center;justify-content:space-between;}
.modal-title{font-size:14px;font-weight:700;}
.modal-body{flex:1;overflow-y:auto;background:var(--bg);border:1px solid var(--border);border-radius:7px;padding:14px;font-size:12px;line-height:1.85;white-space:pre-wrap;font-family:var(--mono);color:var(--text);}
.modal-foot{display:flex;gap:8px;justify-content:flex-end;}
.btn-ghost{background:transparent;color:var(--text2);border:1px solid var(--border-hi);padding:7px 14px;}
.btn-ghost:hover{background:var(--elevated);color:var(--text);}
.btn-green{background:rgba(0,228,154,.12);color:var(--green);border:1px solid rgba(0,228,154,.35);padding:7px 14px;}
.btn-green:hover{background:rgba(0,228,154,.22);}

/* ── SETTINGS ── */
#settings-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.82);align-items:center;justify-content:center;z-index:300;}
#settings-ov.show{display:flex;}
.settings-box{background:var(--panel);border:1px solid var(--border-hi);border-radius:12px;padding:24px;width:min(380px,92vw);display:flex;flex-direction:column;gap:16px;}
.set-label{font-size:12px;color:var(--text2);margin-bottom:5px;}
.set-hint{font-size:11px;color:var(--text3);line-height:1.65;}
.set-hint a{color:var(--blue);}
</style>
</head>
<body>

<!-- ══ SETUP ══ -->
<div id="setup">
  <div class="su-badge">INVESTIGATION AI</div>
  <div class="su-title">실시간 조서 어시스턴트</div>
  <div class="su-desc">AI 실시간 요약·모순탐지·후속질문 제안<br/>수사관의 인지 부하를 최소화합니다</div>
  <input class="su-inp" id="su-key" type="password" placeholder="Anthropic API 키 (sk-ant-api03-...)" autocomplete="off"/>
  <button class="btn btn-primary" style="width:100%;max-width:320px;" onclick="saveKey()">저장하고 시작하기</button>
  <div class="su-link">API 키 발급: <a href="https://console.anthropic.com/settings/keys" target="_blank">console.anthropic.com</a></div>
  <div class="su-link" style="color:var(--text3);font-size:11px;">키는 이 기기 브라우저에만 저장됩니다</div>
</div>

<!-- ══ APP ══ -->
<div id="app">

  <!-- HEADER -->
  <div id="hdr">
    <div class="logo">조서AI</div>
    <input class="case-inp" id="case-inp" placeholder="사건번호"/>
    <div class="rec-wrap">
      <div class="rec-dot" id="rec-dot"></div>
      <span id="rec-lbl">대기</span>
      <span class="rec-time" id="rec-time" style="display:none"></span>
    </div>
    <button class="ibtn" title="설정" onclick="openSettings()">⚙</button>
    <button class="ibtn" title="내보내기" id="exp-btn" onclick="openExport()" disabled>↑</button>
    <button class="ibtn" title="초기화" onclick="clearAll()">✕</button>
  </div>

  <!-- FEED -->
  <div id="feed-wrap">
    <div class="empty" id="feed-empty">
      <div class="empty-ico">🎙</div>
      <div class="empty-t">조사 준비 완료</div>
      <div class="empty-d">하단의 [조사 시작] 버튼을 누르면<br/>음성이 실시간으로 기록됩니다</div>
    </div>
  </div>

  <!-- CONTROLS -->
  <div id="ctrl">
    <div class="ctrl-row">
      <button class="btn btn-primary" id="start-btn" onclick="startRec()">● 조사 시작</button>
      <button class="btn btn-danger" id="stop-btn" onclick="stopRec()" style="display:none">■ 조사 종료</button>
    </div>
    <div class="ctrl-row">
      <div class="spk-wrap">
        <button class="spk-btn q-on" id="spk-q" onclick="setSpeaker('Q')">Q 수사관</button>
        <button class="spk-btn" id="spk-a" onclick="setSpeaker('A')">A 진술자</button>
      </div>
    </div>
  </div>

  <!-- STATUS BAR -->
  <div id="sbar">
    <div class="si"><div class="sdot" id="sr-dot"></div><span id="sr-txt">음성인식 확인 중</span></div>
    <span id="interim-txt"></span>
    <div class="si"><div class="sdot" id="api-dot"></div><span id="api-txt">API 대기</span></div>
  </div>

</div><!-- /#app -->

<!-- EXPORT MODAL -->
<div class="modal-ov" id="exp-ov" onclick="if(event.target===this)closeExport()">
  <div class="modal">
    <div class="modal-head">
      <div class="modal-title">📋 조서 보조 기록 내보내기</div>
      <button class="btn btn-ghost" onclick="closeExport()" style="padding:4px 10px;font-size:12px;">✕</button>
    </div>
    <div class="modal-body" id="exp-body"></div>
    <div class="modal-foot">
      <button class="btn btn-ghost" onclick="closeExport()">닫기</button>
      <button class="btn btn-green" onclick="copyExport()">클립보드 복사</button>
    </div>
  </div>
</div>

<!-- SETTINGS MODAL -->
<div class="modal-ov" id="settings-ov" onclick="if(event.target===this)closeSettings()">
  <div class="settings-box">
    <div class="modal-head">
      <div class="modal-title">⚙ 설정</div>
      <button class="btn btn-ghost" onclick="closeSettings()" style="padding:4px 10px;font-size:12px;">✕</button>
    </div>
    <div>
      <div class="set-label">Anthropic API 키</div>
      <input class="su-inp" id="set-key" type="password" placeholder="sk-ant-api03-..." autocomplete="off" style="width:100%;"/>
    </div>
    <div class="set-hint">키는 브라우저 localStorage에만 저장됩니다.<br/><a href="https://console.anthropic.com/settings/keys" target="_blank">console.anthropic.com</a>에서 발급</div>
    <div style="display:flex;gap:8px;justify-content:flex-end;">
      <button class="btn btn-ghost" onclick="closeSettings()">취소</button>
      <button class="btn btn-primary" style="flex:0 0 auto;" onclick="updateKey()">저장</button>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════════════
let apiKey = '';
let isRec = false;
let speaker = 'Q';
let elapsed = 0;
let timer = null;
let rec = null;
let shouldRun = false;

// 전사
let transcripts = [];   // {id,seq,speaker,text,time}
let tCount = 0;

// 발화 병합 버퍼
let uttBuffer = [];
let uttTimer = null;
const UTT_TIMEOUT = 2000;
const UTT_FLUSH_DELAY = 500;
const END_PATTERNS = /[했어요했습니다그랬습니다그랬어요맞습니다아닙니다없어요모릅니다겠습니다이에요거예요입니다]$/;
const END_RE = /(했어요|했습니다|그랬습니다|그랬어요|맞습니다|아닙니다|없어요|모릅니다|겠습니다|이에요|거예요|입니다)$/;

// 중복 방지
let lastFinalTxt = '';
let lastFinalTime = 0;
let globalIdx = 0;

// AI 큐
let summaryQueue = [];
let summaryBusy = false;
let lastSummaryCall = 0;
const MIN_CALL_INTERVAL = 3000;

// 누적 데이터
let aTranscripts = [];  // A 발화만
let aCount = 0;         // A 발화 누적 수
let allFacts = [];      // 요약 결과
let allContra = [];     // 모순 탐지 결과 (중복 방지용 id 세트)
let contraIds = new Set();
let timeline = [];

// ═══════════════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════════════
window.addEventListener('load', () => {
  if ('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js').catch(()=>{});
  const k = localStorage.getItem('joseo_api_key');
  if (k) { apiKey = k; showApp(); }
  initSpeech();
});

function showApp() {
  document.getElementById('setup').style.display = 'none';
  document.getElementById('app').style.display = 'flex';
}

function saveKey() {
  const v = document.getElementById('su-key').value.trim();
  if (!v.startsWith('sk-')) { alert('올바른 API 키 형식이 아닙니다.'); return; }
  apiKey = v;
  localStorage.setItem('joseo_api_key', v);
  showApp();
}
function openSettings() { document.getElementById('set-key').value = apiKey||''; document.getElementById('settings-ov').classList.add('show'); }
function closeSettings() { document.getElementById('settings-ov').classList.remove('show'); }
function updateKey() {
  const v = document.getElementById('set-key').value.trim();
  if (v && !v.startsWith('sk-')) { alert('올바른 API 키 형식을 확인해 주세요.'); return; }
  if (v) { apiKey = v; localStorage.setItem('joseo_api_key', v); }
  closeSettings();
}

// ═══════════════════════════════════════════════════════════════
// SPEECH RECOGNITION
// ═══════════════════════════════════════════════════════════════
function initSpeech() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  const dot = document.getElementById('sr-dot');
  const txt = document.getElementById('sr-txt');
  if (!SR) {
    dot.classList.add('err'); txt.textContent = '음성인식 미지원 (Chrome 필요)';
    document.getElementById('start-btn').disabled = true; return;
  }
  dot.classList.add('ok'); txt.textContent = '음성인식 지원됨';

  rec = new SR();
  rec.lang = 'ko-KR';
  rec.continuous = true;
  rec.interimResults = true;
  rec.maxAlternatives = 1;

  rec.onresult = onResult;
  rec.onerror = (e) => { if (e.error === 'no-speech') return; console.warn('STT:', e.error); };
  rec.onend = () => {
    if (shouldRun) {
      globalIdx = 0; // 재시작 시 인덱스 리셋
      setTimeout(() => { try { rec.start(); } catch(_){} }, 200);
    }
  };
}

function onResult(e) {
  let interim = '';
  for (let i = e.resultIndex; i < e.results.length; i++) {
    const r = e.results[i];
    if (r.isFinal) {
      const text = r[0].transcript.trim();
      if (!text) continue;
      const now = Date.now();
      // 3중 중복 차단
      if (text === lastFinalTxt && (now - lastFinalTime) < 1500) continue;
      if (i < globalIdx) continue;
      lastFinalTxt = text;
      lastFinalTime = now;
      globalIdx = i + 1;

      const spk = speaker;
      const time = new Date().toLocaleTimeString('ko-KR',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
      const seq = ++tCount;
      const entry = { id:`t${seq}`, seq, speaker:spk, text, time };

      // 전사 카드 즉시 표시
      addTranscriptCard(entry);
      transcripts.push(entry);
      if (spk === 'A') { aTranscripts.push(entry); aCount++; }
      document.getElementById('interim-txt').textContent = '';

      // 발화 병합 버퍼
      bufferUtterance(entry);
    } else {
      interim += r[0].transcript;
    }
  }
  if (interim) document.getElementById('interim-txt').textContent = interim + '…';
}

// ═══════════════════════════════════════════════════════════════
// UTTERANCE BUFFER (발화 병합)
// ═══════════════════════════════════════════════════════════════
function bufferUtterance(entry) {
  // 화자 전환 감지 → 즉시 플러시
  if (uttBuffer.length > 0 && uttBuffer[0].speaker !== entry.speaker) {
    flushBuffer();
  }
  uttBuffer.push(entry);

  // 종결 패턴 감지
  if (END_RE.test(entry.text)) {
    clearTimeout(uttTimer);
    uttTimer = setTimeout(flushBuffer, UTT_FLUSH_DELAY);
  } else {
    clearTimeout(uttTimer);
    uttTimer = setTimeout(flushBuffer, UTT_TIMEOUT);
  }
}

function flushBuffer() {
  clearTimeout(uttTimer);
  if (uttBuffer.length === 0) return;
  const buf = [...uttBuffer];
  uttBuffer = [];
  const merged = buf.map(b => b.text).join(' ');
  const spk = buf[0].speaker;
  const now = Date.now();

  // AI 호출 최소 조건
  if (merged.length < 10) return;
  if (now - lastSummaryCall < MIN_CALL_INTERVAL) return;
  lastSummaryCall = now;

  enqueueSummary({ text: merged, speaker: spk, refSeqs: buf.map(b=>b.seq) });

  // 주기적 분석 (A 발화 기준)
  if (spk === 'A') {
    if (aCount % 5 === 0) {
      enqueueContra();
      enqueueSuggest();
    }
    if (aCount % 10 === 0) {
      enqueueTimeline();
    }
  }
}

// ═══════════════════════════════════════════════════════════════
// RECORDING CONTROLS
// ═══════════════════════════════════════════════════════════════
function startRec() {
  if (!rec) return;
  shouldRun = true;
  lastFinalTxt = ''; lastFinalTime = 0; globalIdx = 0;
  try { rec.start(); } catch(_){}
  isRec = true; elapsed = 0;
  timer = setInterval(() => {
    elapsed++;
    const m = String(Math.floor(elapsed/60)).padStart(2,'0');
    const s = String(elapsed%60).padStart(2,'0');
    document.getElementById('rec-time').textContent = `${m}:${s}`;
  }, 1000);
  document.getElementById('rec-dot').classList.add('on');
  document.getElementById('rec-lbl').textContent = 'REC';
  document.getElementById('rec-time').style.display = '';
  document.getElementById('start-btn').style.display = 'none';
  document.getElementById('stop-btn').style.display = '';
  document.getElementById('case-inp').disabled = true;
}

function stopRec() {
  shouldRun = false;
  flushBuffer(); // 남은 버퍼 처리
  try { rec.stop(); } catch(_){}
  isRec = false; clearInterval(timer);
  document.getElementById('rec-dot').classList.remove('on');
  document.getElementById('rec-lbl').textContent = '완료';
  document.getElementById('rec-time').style.display = 'none';
  document.getElementById('start-btn').style.display = '';
  document.getElementById('stop-btn').style.display = 'none';
  document.getElementById('case-inp').disabled = false;
  document.getElementById('interim-txt').textContent = '';
  // 종료 시 타임라인 최종 갱신
  if (aTranscripts.length > 0) enqueueTimeline();
}

function setSpeaker(spk) {
  // 화자 전환 시 버퍼 플러시
  if (speaker !== spk && uttBuffer.length > 0) flushBuffer();
  speaker = spk;
  document.getElementById('spk-q').className = 'spk-btn' + (spk==='Q'?' q-on':'');
  document.getElementById('spk-a').className = 'spk-btn' + (spk==='A'?' a-on':'');
}

function clearAll() {
  if (isRec) stopRec();
  transcripts=[]; aTranscripts=[]; allFacts=[]; allContra=[]; contraIds=new Set(); timeline=[];
  tCount=0; aCount=0; summaryQueue=[]; summaryBusy=false;
  uttBuffer=[]; clearTimeout(uttTimer);
  const fw = document.getElementById('feed-wrap');
  fw.innerHTML = '';
  fw.appendChild(emptyEl());
  document.getElementById('exp-btn').disabled = true;
  document.getElementById('interim-txt').textContent = '';
  setApiStatus('idle');
}

// ═══════════════════════════════════════════════════════════════
// DOM HELPERS
// ═══════════════════════════════════════════════════════════════
function emptyEl() {
  const d = document.createElement('div');
  d.className = 'empty'; d.id = 'feed-empty';
  d.innerHTML = `<div class="empty-ico">🎙</div><div class="empty-t">조사 준비 완료</div><div class="empty-d">하단의 [조사 시작] 버튼을 누르면<br/>음성이 실시간으로 기록됩니다</div>`;
  return d;
}

function addCard(el) {
  const fw = document.getElementById('feed-wrap');
  const emp = fw.querySelector('#feed-empty');
  if (emp) emp.remove();
  fw.appendChild(el);
  fw.scrollTop = fw.scrollHeight;
  document.getElementById('exp-btn').disabled = false;
}

function addTranscriptCard(entry) {
  const d = document.createElement('div');
  d.className = `card card-${entry.speaker.toLowerCase()}`;
  d.id = entry.id;
  d.innerHTML = `<div class="qa-meta"><span class="qa-spk ${entry.speaker.toLowerCase()}">${entry.speaker === 'Q' ? 'Q 수사관':'A 진술자'}</span><span class="qa-time">${entry.time}</span></div><div class="qa-text">${esc(entry.text)}</div>`;
  addCard(d);
}

function addLoadingCard(id) {
  const d = document.createElement('div');
  d.className = 'loading-card'; d.id = `ld-${id}`;
  d.innerHTML = `<div class="ld-tag"><div class="dots"><span></span><span></span><span></span></div>AI 분석 중</div>`;
  addCard(d);
}

function replaceLoadingWithFact(id, result) {
  const ld = document.getElementById(`ld-${id}`);
  if (!ld) return;
  if (result.skip) { ld.remove(); return; }
  const d = document.createElement('div');
  d.className = 'card card-fact';
  d.id = `fact-${id}`;
  const kwHtml = (result.keywords||[]).map(k=>`<span class="kw">${esc(k)}</span>`).join('');
  d.innerHTML = `
    <div class="fact-tag">⚡ 핵심 팩트</div>
    <div class="fact-main">${esc(result.fact)}</div>
    ${result.statement ? `<div class="fact-stmt">${esc(result.statement)}</div>` : ''}
    ${kwHtml ? `<div class="fact-kw">${kwHtml}</div>` : ''}
    <div class="fact-seq">#${allFacts.length+1}</div>`;
  ld.replaceWith(d);
  const fw = document.getElementById('feed-wrap');
  fw.scrollTop = fw.scrollHeight;
}

function addContraCard(item) {
  const d = document.createElement('div');
  d.className = 'card card-contra';
  d.innerHTML = `
    <div class="contra-tag">⚠ 진술 모순 감지 <span class="contra-level ${item.level}">${item.level === 'high'?'명확':'가능성'}</span></div>
    <div class="contra-row"><span class="contra-label">이전</span><span class="contra-val">${esc(item.prev)}</span></div>
    <div class="contra-row"><span class="contra-label">현재</span><span class="contra-val">${esc(item.curr)}</span></div>
    <div class="contra-note">→ ${esc(item.note)}</div>`;
  addCard(d);
}

function addSuggestCard(items) {
  if (!items || items.length === 0) return;
  const d = document.createElement('div');
  d.className = 'card card-suggest';
  const listHtml = items.map(it=>`
    <div class="sugg-item">
      <span class="sugg-pri">${it.priority}.</span>
      <div>
        <div class="sugg-q">${esc(it.question)}</div>
        <div class="sugg-reason">${esc(it.reason)}</div>
      </div>
    </div>`).join('');
  d.innerHTML = `<div class="sugg-tag">💬 AI 제안 질문</div><div class="sugg-list">${listHtml}</div>`;
  addCard(d);
}

function esc(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function setApiStatus(st) {
  const dot = document.getElementById('api-dot');
  const txt = document.getElementById('api-txt');
  dot.className = 'sdot' + (st==='ok'?' ok':st==='err'?' err':'');
  txt.textContent = st==='ok'?'Claude 연결됨':st==='err'?'API 오류':'API 대기';
}

// ═══════════════════════════════════════════════════════════════
// AI QUEUE (직렬 처리)
// ═══════════════════════════════════════════════════════════════
function enqueueSummary(item) { summaryQueue.push({type:'summary',...item}); processQueue(); }
function enqueueContra()      { summaryQueue.push({type:'contra'}); processQueue(); }
function enqueueSuggest()     { summaryQueue.push({type:'suggest'}); processQueue(); }
function enqueueTimeline()    { summaryQueue.push({type:'timeline'}); processQueue(); }

async function processQueue() {
  if (summaryBusy || summaryQueue.length === 0) return;
  summaryBusy = true;
  const item = summaryQueue.shift();
  try {
    if (item.type === 'summary')  await runSummary(item);
    if (item.type === 'contra')   await runContra();
    if (item.type === 'suggest')  await runSuggest();
    if (item.type === 'timeline') await runTimeline();
  } catch(e) { console.error('Queue error:', e); }
  summaryBusy = false;
  processQueue();
}

// ═══════════════════════════════════════════════════════════════
// AI MODULE 1: 핵심 팩트 요약
// ═══════════════════════════════════════════════════════════════
async function runSummary(item) {
  const id = `sum-${Date.now()}`;
  addLoadingCard(id);
  const spkLabel = item.speaker === 'Q' ? '수사관의 질문' : '피조사자의 진술';
  const prompt = `당신은 형사사건 수사관의 조서 작성을 보조하는 AI입니다.
입력된 ${spkLabel}을 분석하여 아래 JSON 형식으로만 응답하십시오.
설명, 부연, 마크다운 기호는 절대 출력하지 마십시오.

{"fact":"핵심 팩트 20자 이내","statement":"조서 기재용 문장 3인칭 과거형 ~진술하였다 형식","keywords":["키워드최대4개"],"relevance":"high|medium|low","skip":false}

규칙:
1. 감정 호소·중언부언·욕설·무관한 내용 제거
2. 사건 관련 팩트(일시/장소/행위/대상/동기)가 없으면 skip:true
3. skip:true이면 statement는 빈 문자열
4. relevance: 직접관련=high / 간접=medium / 무관=low

원문: "${item.text}"`;

  const res = await callClaude(prompt, 300);
  if (!res) { document.getElementById(`ld-${id}`)?.remove(); return; }
  const parsed = safeJson(res);
  if (!parsed) { document.getElementById(`ld-${id}`)?.remove(); return; }
  if (!parsed.skip) allFacts.push({...parsed, source: item.text});
  replaceLoadingWithFact(id, parsed);
}

// ═══════════════════════════════════════════════════════════════
// AI MODULE 2: 진술 모순 탐지
// ═══════════════════════════════════════════════════════════════
async function runContra() {
  if (aTranscripts.length < 3) return;
  const recent = aTranscripts.slice(-20).map((t,i)=>`${i+1}. ${t.text}`).join('\n');
  const prompt = `당신은 형사사건 진술의 논리적 일관성을 분석하는 AI입니다.
아래 진술 목록에서 서로 모순되거나 불일치하는 내용을 찾아
JSON 배열로만 응답하십시오. 모순이 없으면 빈 배열 []을 반환하십시오.

[{"id":"c001","level":"high|medium","prev":"이전 진술 요약","curr":"현재 진술 요약","note":"확인 포인트 한 문장"}]

규칙:
1. 장소·시간·행위 대상·동기에서 불일치가 발생한 경우만 출력
2. 단순 표현 차이·어순 차이는 모순 아님
3. 이미 탐지된 모순 ID 목록: [${[...contraIds].join(',')}] — 중복 출력 금지

진술 목록:
${recent}`;

  const res = await callClaude(prompt, 500);
  if (!res) return;
  const parsed = safeJson(res);
  if (!Array.isArray(parsed)) return;
  parsed.forEach(item => {
    if (!item.id || contraIds.has(item.id)) return;
    contraIds.add(item.id);
    allContra.push(item);
    addContraCard(item);
  });
}

// ═══════════════════════════════════════════════════════════════
// AI MODULE 3: 후속 질문 제안
// ═══════════════════════════════════════════════════════════════
async function runSuggest() {
  if (transcripts.length < 3) return;
  const txts = transcripts.slice(-20).map(t=>`[${t.speaker}] ${t.text}`).join('\n');
  const contraSum = allContra.map(c=>`이전:${c.prev} / 현재:${c.curr}`).join('\n') || '없음';
  const prompt = `당신은 형사사건 수사를 보조하는 AI입니다.
지금까지의 진술과 모순 탐지 결과를 분석하여
수사관이 추가로 확인해야 할 질문을 최대 3개 제안하십시오.
JSON 배열로만 응답하십시오.

[{"priority":1,"question":"수사관이 그대로 읽을 수 있는 한국어 질문","reason":"이유 한 문장"}]

규칙:
1. 이미 명확히 진술된 사항은 제안하지 않음
2. 우선순위: 모순관련 > 시간공백 > 장소미확인 > 동기미확인
3. 모순이 있으면 관련 질문을 priority 1에 배치
4. 최대 3개만 출력

진술 내용:
${txts}

탐지된 모순:
${contraSum}`;

  const res = await callClaude(prompt, 400);
  if (!res) return;
  const parsed = safeJson(res);
  if (!Array.isArray(parsed) || parsed.length === 0) return;
  addSuggestCard(parsed);
}

// ═══════════════════════════════════════════════════════════════
// AI MODULE 4: 사건 타임라인 (내보내기 전용)
// ═══════════════════════════════════════════════════════════════
async function runTimeline() {
  if (aTranscripts.length < 3) return;
  const txts = aTranscripts.map(t=>t.text).join('\n');
  const prompt = `당신은 진술에서 사건의 시간적 흐름을 추출하는 AI입니다.
아래 진술에서 시간·장소·행동 정보를 추출하여
시간 순서대로 JSON 배열로만 응답하십시오.

[{"time":"21:30 또는 불상","place":"장소명 또는 불상","action":"행동 15자 이내","confidence":"high|medium|low"}]

규칙:
1. 명시적 시간 없으면 "불상"
2. confidence: 직접언급=high / 맥락추정=medium / 불확실=low
3. 중복 이벤트 통합, 사건 전·중·후 순서 정렬

진술:
${txts}`;

  const res = await callClaude(prompt, 500);
  if (!res) return;
  const parsed = safeJson(res);
  if (Array.isArray(parsed)) timeline = parsed;
}

// ═══════════════════════════════════════════════════════════════
// CLAUDE API CALL
// ═══════════════════════════════════════════════════════════════
async function callClaude(prompt, maxTokens) {
  if (!apiKey) { setApiStatus('err'); return null; }
  let attempts = 0;
  while (attempts < 3) {
    try {
      const r = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-api-key': apiKey,
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-access': 'true'
        },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: maxTokens,
          messages: [{ role: 'user', content: prompt }]
        })
      });
      if (r.status === 400) {
        const err = await r.json().catch(()=>({}));
        if (err?.error?.message?.includes('credit')) {
          setApiStatus('err');
          document.getElementById('api-txt').textContent = '크레딧 부족 — 충전 필요';
          return null;
        }
      }
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      const data = await r.json();
      const txt = data.content?.find(b=>b.type==='text')?.text?.trim() || '';
      setApiStatus('ok');
      return txt;
    } catch(e) {
      attempts++;
      if (attempts >= 3) { setApiStatus('err'); return null; }
      await sleep(1000 * attempts);
    }
  }
  return null;
}

function safeJson(txt) {
  try {
    const clean = txt.replace(/```json|```/g,'').trim();
    return JSON.parse(clean);
  } catch(_) {
    // JSON 블록 추출 시도
    const m = txt.match(/(\[[\s\S]*\]|\{[\s\S]*\})/);
    if (m) { try { return JSON.parse(m[1]); } catch(_){} }
    return null;
  }
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

// ═══════════════════════════════════════════════════════════════
// EXPORT
// ═══════════════════════════════════════════════════════════════
function openExport() {
  const caseNo = document.getElementById('case-inp').value || '미입력';
  const now = new Date().toLocaleString('ko-KR');
  const qN = transcripts.filter(t=>t.speaker==='Q').length;
  const aN = transcripts.filter(t=>t.speaker==='A').length;

  const factLines = allFacts.filter(f=>!f.skip&&f.statement)
    .map((f,i)=>`[${i+1}] ${f.statement}`).join('\n') || '  (없음)';

  const tlLines = timeline.length > 0
    ? timeline.map(t=>`  ${t.time}  ${t.place}  ${t.action}${t.confidence==='low'?' (추정)':''}`).join('\n')
    : '  (없음)';

  const contraLines = allContra.length > 0
    ? allContra.map((c,i)=>`  [${i+1}] ${c.level==='high'?'●명확':'○가능'} 이전:${c.prev} / 현재:${c.curr}\n      → ${c.note}`).join('\n')
    : '  (없음)';

  const rawLines = transcripts.map(t=>`(${t.time}) [${t.speaker}] ${t.text}`).join('\n') || '  (없음)';

  const lines = [
    '■ 조서 보조 기록 — AI 실시간 요약본',
    `사건번호  : ${caseNo}`,
    `조사일시  : ${now}`,
    `발화 현황 : Q ${qN}건 / A ${aN}건`,
    '',
    '━'.repeat(46),
    '【 AI 핵심 요약 — 조서 기재용 】',
    '━'.repeat(46),
    factLines,
    '',
    '━'.repeat(46),
    '【 사건 타임라인 】',
    '━'.repeat(46),
    tlLines,
    '',
    '━'.repeat(46),
    '【 진술 모순 탐지 결과 】',
    '━'.repeat(46),
    contraLines,
    '',
    '━'.repeat(46),
    '【 전체 전사 원문 】',
    '━'.repeat(46),
    rawLines
  ];

  document.getElementById('exp-body').textContent = lines.join('\n');
  document.getElementById('exp-ov').classList.add('show');
}
function closeExport() { document.getElementById('exp-ov').classList.remove('show'); }
function copyExport() {
  const txt = document.getElementById('exp-body').textContent;
  navigator.clipboard.writeText(txt).then(()=>{
    const btn = event.target;
    btn.textContent = '복사됨 ✓';
    setTimeout(()=>{ btn.textContent='클립보드 복사'; }, 1800);
  }).catch(()=>alert('복사 실패 — 텍스트를 직접 선택해 주세요.'));
}
